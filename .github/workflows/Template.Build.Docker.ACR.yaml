name: Template.Build.Docker.ACR

on:
  workflow_call:
    outputs:
      image_tag:
        value: ${{ jobs.build.outputs.image_tag }}

    inputs:
      image_repository:
        required: true
        type: string
      image_registry:
        required: true
        type: string
      dockerfile_path:
        required: true
        type: string
      build_context:
        required: true
        type: string
      azure_tenant_id:
        required: true
        type: string
      azure_subscription_id:
        required: true
        type: string

    secrets:
      ACR_CLIENT_ID:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      IMAGE_REGISTRY: ${{ inputs.image_registry }}
      IMAGE_REPOSITORY: ${{ inputs.image_repository }}
      AZURE_TENANT_ID: ${{ inputs.azure_tenant_id }}
      AZURE_SUBSCRIPTION_ID: ${{ inputs.azure_subscription_id }}
      DOCKERFILE_PATH: ${{ inputs.dockerfile_path }}
      BUILD_CONTEXT: ${{ inputs.build_context }}

    outputs:
      image_tag: ${{ steps.create_tag.outputs.image_tag }}

    steps:
      - uses: actions/checkout@v6

      - id: create_tag
        name: Create tag
        shell: bash
        run: |
          SHORT_SHA=${GITHUB_SHA::8}
          BRANCH_NAME="${GITHUB_REF_NAME}"
          SAFE_BRANCH_NAME="$(echo "${BRANCH_NAME}" | tr '[:upper:]/ ' '[:lower:]--' | sed 's/[^a-z0-9_.-]/-/g')"
          DATE_PART="$(date +%Y%m%d)"
          TIME_PART="$(date +%H%M%S)"
          IMAGE_TAG="${SAFE_BRANCH_NAME}-${DATE_PART}-${TIME_PART}-${SHORT_SHA}"
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT

      - name: Login to Azure with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ACR_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
          federated-token: true
          allow-no-subscription: true

      - name: Login to Azure Container Registry
        run: |
          az acr login --name "${IMAGE_REGISTRY%%.*}"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/build-push-action@v7
        with:
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          context: ${{ env.BUILD_CONTEXT }}
          file: ${{ env.DOCKERFILE_PATH }}
          tags: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_REPOSITORY }}:${{ steps.create_tag.outputs.image_tag }}
