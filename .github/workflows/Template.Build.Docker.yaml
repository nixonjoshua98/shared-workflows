name: Template.Build.Docker

on:
  workflow_call:
    outputs:
      image_tag:
        value: ${{ jobs.build.outputs.image_tag }}

    inputs:
      image_repository:
        required: true
        type: string
      dockerfile_path:
        required: true
        type: string
      build_context:
        required: true
        type: string

    secrets:
      ACR_PASSWORD:
        required: true
      ACR_USERNAME:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    env:
      ACR_REGISTRY: ${{ vars.ACR_REGISTRY }}
      ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
      ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
      IMAGE_REPOSITORY: ${{ inputs.image_repository }}
      DOCKERFILE_PATH: ${{ inputs.dockerfile_path }}
      BUILD_CONTEXT: ${{ inputs.build_context }}
      
    outputs:
      image_tag: ${{ steps.create_tag.outputs.image_tag }}
      
    steps:
      - uses: actions/checkout@v6

      - id: create_tag
        name: Create tag
        shell: bash
        run: |
          SHORT_SHA=${GITHUB_SHA::8}
          BRANCH_NAME="${GITHUB_REF_NAME}"
          SAFE_BRANCH_NAME="$(echo "${BRANCH_NAME}" | tr '[:upper:]/ ' '[:lower:]--' | sed 's/[^a-z0-9_.-]/-/g')"
          DATE_PART="$(date +%Y%m%d)"
          TIME_PART="$(date +%H%M%S)"
          IMAGE_TAG="${SAFE_BRANCH_NAME}-${DATE_PART}-${TIME_PART}-${SHORT_SHA}"
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ env.ACR_USERNAME }}
          password: ${{ env.ACR_PASSWORD }}
          
      - uses: docker/setup-buildx-action@v4

      - uses: docker/build-push-action@v7
        with:
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          context: ${{ env.BUILD_CONTEXT }}
          file: ${{ env.DOCKERFILE_PATH }}
          tags: ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_REPOSITORY }}:${{ steps.create_tag.outputs.image_tag }}
